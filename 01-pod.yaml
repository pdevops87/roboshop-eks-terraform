apiVersion: v1
kind: Pod
metadata:
  name: demo1
spec:
  containers:
    - name: nginx
      image: nginx:1.27


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels:
    appName: catalogue
spec:
  replicas: 1
  selector:
    matchLabels:
      appName: catalogue
  template:
    metadata:
      labels:
        appName: catalogue
    spec:
      containers:
        - name: catalogue
          image: public.ecr.aws/w8x4g9h7/roboshop-v3/catalogue
          env:
           - name: INSTANA_ENABLED
             value: "false"
           - name: DB_TYPE
             value: "mongo"
           - name: APP_GIT_URL
             value: "https://github.com/roboshop-devops-project-v3/catalogue"
           - name: DB_HOST
             value: "172.31.17.236"
           - name: SCHEMA_FILE
             value: "db/master-data.js"

---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
spec:
  selector:
    appName: catalogue
  ports:
    - port: 8080 # Service port [internally load balancer service port is 80 ]
      targetPort: 8080  # Pod container port
  type: ClusterIP
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-cmap
data:
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  CART_HOST: "cart"
  CART_PORT: "8080"
  SHIPPING_HOST: "shipping"
  SHIPPING_PORT: "8080"
  PAYMENT_HOST: "payment"
  PAYMENT_PORT: "8080"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    appName: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      appName: frontend
  template:
    metadata:
      labels:
        appName: frontend
    spec:
      containers:
        - name: frontend
          image: public.ecr.aws/w8x4g9h7/roboshop-v3/frontend
          envFrom:
            - configMapRef:
                name: frontend-cmap
          ports:
           - containerPort: 80
             hostPort: 80

